name: PHP CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate VERSION bump
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "src\|config\|tests"; then
            if ! git diff --name-only HEAD^ HEAD | grep -q "VERSION"; then
              echo "::error::VERSION file must be updated when source changes."
              exit 1
            fi
          fi

      - name: Run PHPCS
        run: vendor/bin/phpcs src

      - name: PHP-CS-Fixer (dry run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src --level=max

      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-text

      - name: Rector (dry run)
        run: vendor/bin/rector process src --dry-run

      - name: Run Infection (mutation testing)
        run: vendor/bin/infection --min-msi=60 --threads=2