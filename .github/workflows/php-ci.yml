name: PHP CI

on:
  workflow_call:
    inputs:
      php-version:
        required: false
        type: string
        default: '8.5'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------
      # Kontroll: är detta ett riktigt PHP service-repo?
      # ---------------------------------------------------
      - name: Check if PHP CI should run
        id: repo_check
        run: |
          if [ -f ".ci/php-service" ]; then
            echo "RUN_PHP_CI=true" >> $GITHUB_OUTPUT
            echo "PHP service repo detected → running PHP CI"
          else
            echo "RUN_PHP_CI=false" >> $GITHUB_OUTPUT
            echo "Template or non-PHP repo → skipping PHP CI"
          fi

      # ---------------------------------------------------
      # Setup PHP (endast riktiga service-repos)
      # ---------------------------------------------------
      - name: Setup PHP
        if: steps.repo_check.outputs.RUN_PHP_CI == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer
          coverage: none

      # ---------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------
      - name: Composer install
        if: steps.repo_check.outputs.RUN_PHP_CI == 'true'
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          else
            echo "No composer.json found, skipping."
          fi

      # ---------------------------------------------------
      # PHPUnit
      # ---------------------------------------------------
      - name: PHPUnit
        if: steps.repo_check.outputs.RUN_PHP_CI == 'true'
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "PHPUnit not installed, skipping."
          fi

      # ---------------------------------------------------
      # PHPStan (om installerad)
      # ---------------------------------------------------
      - name: PHPStan
        if: steps.repo_check.outputs.RUN_PHP_CI == 'true'
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse
          else
            echo "PHPStan not installed, skipping."
          fi

      # ---------------------------------------------------
      # Coding standards (PHP-CS-Fixer, om installerad)
      # ---------------------------------------------------
      - name: Coding standards
        if: steps.repo_check.outputs.RUN_PHP_CI == 'true'
        run: |
          if [ -f vendor/bin/php-cs-fixer ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff
          else
            echo "PHP-CS-Fixer not installed, skipping."
          fi

      # ---------------------------------------------------
      # Require VERSION bump
      # ---------------------------------------------------
      - name: Require VERSION bump
        if: steps.repo_check.outputs.RUN_PHP_CI == 'true'
        shell: bash
        run: |
          set -euo pipefail
      
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            DIFF_RANGE="origin/${{ github.base_ref }}...HEAD"
          else
            DIFF_RANGE="${{ github.event.before }}...${{ github.sha }}"
          fi
      
          echo "Checking diff range: $DIFF_RANGE"
      
          if git diff --name-only "$DIFF_RANGE" | grep -E '(^src/|\.php$)'; then
            if ! git diff --name-only "$DIFF_RANGE" | grep -q '^VERSION$'; then
              echo "::error::VERSION file must be updated when PHP source files change."
              exit 1
            fi
          fi

      # ---------------------------------------------------
      # Skip info
      # ---------------------------------------------------
      - name: Skip message
        if: steps.repo_check.outputs.RUN_PHP_CI == 'false'
        run: echo "PHP CI skipped (template or non-service repo)."
