name: Frontend CI

on:
  workflow_call: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Kontroll: är detta ett riktigt frontend-repo?
      # ---------------------------------------------------
      - name: Check if frontend CI should run
        id: repo_check
        run: |
          if [ -f ".ci/frontend" ]; then
            echo "RUN_FRONTEND_CI=true" >> $GITHUB_OUTPUT
            echo "Frontend repo detected → running frontend CI"
          else
            echo "RUN_FRONTEND_CI=false" >> $GITHUB_OUTPUT
            echo "Template or non-frontend repo → skipping frontend CI"
          fi

      # ---------------------------------------------------
      # Setup Node (endast riktiga frontend-repos)
      # ---------------------------------------------------
      - name: Setup Node
        if: steps.repo_check.outputs.RUN_FRONTEND_CI == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      # ---------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------
      - name: Install dependencies
        if: steps.repo_check.outputs.RUN_FRONTEND_CI == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # ---------------------------------------------------
      # Kontrollera att DTO-typer från OpenAPI är uppdaterade
      # ---------------------------------------------------
      - name: Check generated types
        run: |
          npm run generate-types
          if ! git diff --quiet src/generated/types.ts; then
            echo "::error::Generated types are out of date. Run npm run generate-types and commit the result."
            exit 1
          fi

      # ---------------------------------------------------
      # ESLint
      # ---------------------------------------------------
      - name: Lint
        if: steps.repo_check.outputs.RUN_FRONTEND_CI == 'true'
        run: npm run lint

      # ---------------------------------------------------
      # Enhetstester
      # ---------------------------------------------------
      - name: Unit tests
        if: steps.repo_check.outputs.RUN_FRONTEND_CI == 'true'
        run: npm run test:unit

      # ---------------------------------------------------
      # Build
      # ---------------------------------------------------
      - name: Build for production
        if: steps.repo_check.outputs.RUN_FRONTEND_CI == 'true'
        run: npm run build

      # ---------------------------------------------------
      # Skip info
      # ---------------------------------------------------
      - name: Skip message
        if: steps.repo_check.outputs.RUN_FRONTEND_CI == 'false'
        run: echo "Frontend CI skipped (template or non-frontend repo)."
