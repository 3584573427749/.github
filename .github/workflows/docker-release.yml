name: Docker Release

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Kontroll: är detta ett riktigt backend service-repo?
      # ---------------------------------------------------
      - name: Check if Docker release should run
        id: repo_check
        run: |
          if [ -f ".ci/run-phpunit" ]; then
            echo "RUN_DOCKER_RELEASE=true" >> $GITHUB_OUTPUT
            echo "Backend service repo detected → running Docker release"
          else
            echo "RUN_DOCKER_RELEASE=false" >> $GITHUB_OUTPUT
            echo "Template or non-backend repo → skipping Docker release"
          fi

      # ---------------------------------------------------
      # Avbryt tidigt om det inte är ett service-repo
      # ---------------------------------------------------
      - name: Skip Docker release
        if: steps.repo_check.outputs.RUN_DOCKER_RELEASE == 'false'
        run: echo "Docker release skipped (template or non-service repo)."

      # ---------------------------------------------------
      # Läs VERSION
      # ---------------------------------------------------
      - name: Read VERSION
        if: steps.repo_check.outputs.RUN_DOCKER_RELEASE == 'true'
        id: version
        run: |
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file is required for Docker release."
            exit 1
          fi
          echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # ---------------------------------------------------
      # Setup Docker Buildx
      # ---------------------------------------------------
      - name: Set up Docker Buildx
        if: steps.repo_check.outputs.RUN_DOCKER_RELEASE == 'true'
        uses: docker/setup-buildx-action@v3

      # ---------------------------------------------------
      # Login to GHCR
      # ---------------------------------------------------
      - name: Login to GHCR
        if: steps.repo_check.outputs.RUN_DOCKER_RELEASE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------
      # Build & Push Docker image
      # ---------------------------------------------------
      - name: Build & Push
        if: steps.repo_check.outputs.RUN_DOCKER_RELEASE == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
