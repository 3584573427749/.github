name: OpenAPI Validation

on:
  workflow_call: 

jobs:
  openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------
      # Kontroll: ska OpenAPI-check köras i detta repo?
      # (backend ELLER frontend, men inte mall)
      # ---------------------------------------------------
      - name: Check if OpenAPI check should run
        id: repo_check
        run: |
          if [ -f ".ci/php-service" ] || [ -f ".ci/frontend" ]; then
            echo "RUN_OPENAPI=true" >> $GITHUB_OUTPUT
            echo "Service or frontend repo detected → running OpenAPI validation"
          else
            echo "RUN_OPENAPI=false" >> $GITHUB_OUTPUT
            echo "Template repo detected → skipping OpenAPI validation"
          fi

      - name: Install Node.js
        if: steps.repo_check.outputs.RUN_OPENAPI == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenAPI tools
        if: steps.repo_check.outputs.RUN_OPENAPI == 'true'
        run: |
          npm install -g @redocly/openapi-cli
          npm install -g openapi-diff

      - name: Validate OpenAPI syntax
        if: steps.repo_check.outputs.RUN_OPENAPI == 'true'
        run: openapi lint openapi.yaml

      - name: Validate OpenAPI schema
        if: steps.repo_check.outputs.RUN_OPENAPI == 'true'
        run: openapi validate openapi.yaml

      - name: Detect breaking API changes
        if: steps.repo_check.outputs.RUN_OPENAPI == 'true' && github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          openapi-diff --fail-on-breaking "origin/${{ github.base_ref }}" openapi.yaml
    
      - name: Skip message
        if: steps.repo_check.outputs.RUN_OPENAPI == 'false'
        run: echo "OpenAPI validation skipped (template repo)."
