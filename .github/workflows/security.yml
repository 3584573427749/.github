name: Security Scan

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * *"

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------
      # Identifiera repo-typ via .ci-flaggor
      # -----------------------------------------
      - name: Detect repo type
        id: repo_type
        run: |
          if [ -f ".ci/php-service" ]; then
            echo "TYPE=php-service" >> $GITHUB_OUTPUT
            echo "Detected PHP service repo"

          elif [ -f ".ci/frontend" ]; then
            echo "TYPE=frontend" >> $GITHUB_OUTPUT
            echo "Detected frontend repo"

          else
            echo "TYPE=none" >> $GITHUB_OUTPUT
            echo "Template or unsupported repo → skipping"
          fi

      # -----------------------------------------
      # PHP Backend → Composer audit
      # -----------------------------------------
      - name: Composer Install
        if: steps.repo_type.outputs.TYPE == 'php-service'
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          fi

      - name: Composer Audit
        if: steps.repo_type.outputs.TYPE == 'php-service'
        run: |
          if [ -f composer.json ]; then
            echo "Running composer audit..."
            composer audit 
          fi

      # -----------------------------------------
      # Frontend → npm audit
      # -----------------------------------------
      - name: Node security audit
        if: steps.repo_type.outputs.TYPE == 'frontend'
        run: |
          if [ -f package.json ]; then
            echo "Running npm audit..."

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm audit --audit-level=high
          else
            echo "No package.json found, skipping."
          fi

      # -----------------------------------------
      # Skip info
      # -----------------------------------------
      - name: Skip message
        if: steps.repo_type.outputs.TYPE == 'none'
        run: echo "Security scan skipped (template repo)."
