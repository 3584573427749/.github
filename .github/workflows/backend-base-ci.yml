name: Backend Base CI (Reusable)

on:
  workflow_call:
    inputs:
      php-version:
        required: false
        type: string
        default: '8.3'

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHP syntax check
        run: |
          find src -type f -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run PHPUnit (if available)
        run: |
          if [ -f .ci/run-phpunit ] && [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "No PHPUnit config found, skipping tests"
          fi

      - name: Run PHPStan (if available)
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse
          else
            echo "No PHPStan config found, skipping static analysis"
          fi
